version: "3.8"

services:
  # CPU-only training/inference
  genomic-cpu:
    build:
      context: .
      target: runtime
    volumes:
      - ./workspace:/app/workspace
      - genomic-cache:/root/.cache/genomic-research
    working_dir: /app/workspace

  # GPU training/inference (requires NVIDIA Container Toolkit)
  genomic-gpu:
    build:
      context: .
      target: gpu
    volumes:
      - ./workspace:/app/workspace
      - genomic-cache:/root/.cache/genomic-research
    working_dir: /app/workspace
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # FastAPI inference server
  serve:
    build:
      context: .
      target: runtime
    ports:
      - "8000:8000"
    volumes:
      - ./workspace:/app/workspace
      - genomic-cache:/root/.cache/genomic-research
    working_dir: /app/workspace
    entrypoint: ["genomic-research", "serve"]
    command: ["--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  genomic-cache:
